version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-bookdb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: bookdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./book-management-system
    container_name: spring-book-api
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

  frontend:
    build:
      context: ./book-ui
    container_name: react-book-ui
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data: