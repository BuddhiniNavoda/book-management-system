name: Book Management CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Build backend image
    - name: Build Backend
      run: docker build -t book-backend ./book-management-system

    # 4. Build frontend image
    - name: Build Frontend
      run: docker build -t book-frontend ./book-ui

    # 5. Run docker compose (test build)
    - name: Run containers
      run: docker compose up -d

    # 6. Check running containers
    - name: Verify containers
      run: docker ps

